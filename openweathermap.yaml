openapi: 3.1.0
info:
  version: '1.0'
  title: openweathermap
  summary: Get the current weather
  description: 'Get the current weather, daily forecast for 16 days, and a three-hour-interval forecast for 5 days for your city. Helpful stats, graphics, and this day in history charts are available for your reference. Interactive maps show precipitation, clouds, pressure, wind around your location stations. Data is available in JSON, XML, or HTML format. **Note**: This sample Swagger file covers the `current` endpoint only from the OpenWeatherMap API. <br/><br/> **Note**: All parameters are optional, but you must select at least one parameter. Calling the API by city ID (using the `id` parameter) will provide the most precise location results.'
  termsOfService: 'https://openweathermap.org/terms'
  contact:
    name: Support
    url: 'https://openweathermap.org/ap'
    email: some_email@gmail.com
  license:
    url: 'https://creativecommons.org/licenses/by-sa/4.0/'
    name: Attribution-ShareAlike 4.0 International (CC BY-SA 4.0)
servers:
  - url: 'https://api.openweathermap.org/data/2.5'
    description: prod
paths:
  /weather:
    get:
      tags:
        - Weather endpoints
      summary: Weather
      description: 'Access current weather data for any location on Earth including over 200,000 cities! Current weather is frequently updated based on global models and data from more than 40,000 weather stations.'
      operationId: get-weather
      parameters:
        - name: zip
          in: query
          description: '**Zip code**. Search by zip code. *Example: 95050,us*. Please note that if the country is not specified, the search uses USA as a default.'
          schema:
            type: string
        - name: units
          in: query
          description: '**Units**. *Example: imperial*. Possible values: `standard`, `metric`, and `imperial`. When you do not use the `units` parameter, the format is `standard` by default.'
          schema:
            type: string
            enum:
              - standard
              - metric
              - imperial
        - name: q
          in: query
          description: '**City name**. *Example: London*. You can call by city name, or by city name and country code. The API responds with a list of results that match a searching word. For the query value, type the city name and optionally the country code divided by a comma; use ISO 3166 country codes.'
          schema:
            type: string
        - name: id
          in: query
          description: '**City ID**. *Example: `2172797`*. You can call by city ID. The API responds with the exact result. The List of city IDs can be downloaded [here](http://bulk.openweathermap.org/sample/). You can include multiple cities in this parameter — just separate them by commas. The limit of locations is 20. *Note: A single ID counts as a one API call. So, if you have 3 city IDs, it’s treated as 3 API calls.*'
          schema:
            type: string
        - $ref: '#/components/parameters/lon'
        - name: lat
          in: query
          description: '**Latitude**. *Example: 35*. Latitude coordinate of the location of your interest. Must use with `lat`.'
          schema:
            type: string
        - name: lang
          in: query
          description: '**Language**. *Example: en*. You can use `lang` parameter to get the output in your language. We support the following languages that you can use with the corresponded lang values: Arabic - `ar`, Bulgarian - `bg`, Catalan - `ca`, Czech - `cz`, German - `de`, Greek - `el`, English - `en`, Persian (Farsi) - `fa`, Finnish - `fi`, French - `fr`, Galician - `gl`, Croatian - `hr`, Hungarian - `hu`, Italian - `it`, Japanese - `ja`, Korean - `kr`, Latvian - `la`, Lithuanian - `lt`, Macedonian - `mk`, Dutch - `nl`, Polish - `pl`, Portuguese - `pt`, Romanian - `ro`, Russian - `ru`, Swedish - `se`, Slovak - `sk`, Slovenian - `sl`, Spanish - `es`, Turkish - `tr`, Ukrainian - `ua`, Vietnamese - `vi`, Chinese Simplified - `zh_cn`, Chinese Traditional - `zh_tw`.'
          schema:
            type: string
            enum:
              - ar
              - bg
              - ca
              - cz
              - de
              - el
              - en
              - fa
              - fi
              - fr
              - gl
              - hr
              - hu
              - it
              - ja
              - kr
              - la
              - lt
              - mk
              - nl
              - pl
              - pt
              - ro
              - ru
              - se
              - sk
              - sl
              - es
              - tr
              - ua
              - vi
              - zh_cn
              - zh_tw
            default: en
        - name: mode
          in: query
          description: '**Mode**. Example: html. Determines the format of the response. Possible values are `json`, `xml`, and `html`. If the mode parameter is empty, the format is `json` by default.'
          schema:
            type: string
            enum:
              - json
              - xml
              - html
            default: json
      requestBody:
        content: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  coord:
                    type: object
                    properties:
                      lon:
                        type: number
                        description: 'City geo location, longitude'
                        examples:
                          - 145.77
                      lat:
                        type: number
                        description: 'City geo location, latitude'
                        examples:
                          - -16.92
                  weather:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Weather condition id
                          examples:
                            - ‘803’
                        main:
                          type: string
                          description: 'Group of weather parameters (Rain, Snow, Extreme etc.)'
                          examples:
                            - clouds
                        description:
                          type: string
                          description: Weather condition within the group
                          examples:
                            - broken clouds
                        icon:
                          type: string
                          description: Weather icon id
                          examples:
                            - 04n
                  base:
                    type: string
                    description: Internal parameter
                    examples:
                      - cmc stations
                  main:
                    type: object
                    properties:
                      temp:
                        type: number
                        description: '‘Temperature. Unit Default: Kelvin, Metric: Celsius, Imperial: Fahrenheit.’'
                        examples:
                          - 293.25
                      feels_like:
                        type: number
                        description: What the weather feels like despite the actual numbers
                        examples:
                          - 41.16
                      temp_min:
                        type: number
                        description: '‘Minimum temperature at the moment. This is deviation from current temp that is possible for large cities and megalopolises geographically expanded (use these parameter optionally). Unit Default: Kelvin, Metric: Celsius, Imperial: Fahrenheit.’'
                        examples:
                          - 289.82
                      temp_max:
                        type: number
                        description: '‘Maximum temperature at the moment. This is deviation from current temp that is possible for large cities and megalopolises geographically expanded (use these parameter optionally). Unit Default: Kelvin, Metric: Celsius, Imperial: Fahrenheit.’'
                        examples:
                          - 295.37
                      pressure:
                        type: integer
                        description: 'Atmospheric pressure (on the sea level, if there is no sea_level or grnd_level data), hPa’'
                        examples:
                          - 1019
                      humidity:
                        type: integer
                        description: ' ‘Humidity, %’'
                        examples:
                          - 83
                  wind:
                    type: object
                    properties:
                      speed:
                        type: number
                        description: '‘Wind speed. Unit Default: meter/sec, Metric: meter/sec, Imperial: miles/hour.’'
                        examples:
                          - 5.1
                      deg:
                        type: integer
                        description: '"'
                        examples:
                          - 150
                      visibility:
                        type: integer
                        description: 'Visibility, meter’'
                        examples:
                          - 16093
                  clouds:
                    type: object
                    properties:
                      all:
                        type: integer
                        description: '‘Cloudiness, %’'
                        examples:
                          - 75
                  dt:
                    type: integer
                    description: '‘Time of data calculation, unix, UTC’'
                    examples:
                      - 1435658272
                  sys:
                    type: object
                    properties:
                      type:
                        type: integer
                        description: Internal parameter
                        examples:
                          - 1
                      id:
                        type: integer
                        description: Internal parameter
                        examples:
                          - 8166
                      country:
                        type: string
                        description: 'Country code (GB, JP etc.)’'
                        examples:
                          - ' AU'
                      sunrise:
                        type: integer
                        description: '‘Sunrise time, unix, UTC’'
                        examples:
                          - 1435610796
                      sunset:
                        type: integer
                        description: '‘Sunset time, unix, UTC’'
                        examples:
                          - 1435650870
                  timezone:
                    type: integer
                    description: the timezone for the station
                    examples:
                      - -28800
                  id:
                    type: integer
                    description: City ID
                    examples:
                      - 2172797
                  name:
                    type: string
                    description: Name
                    examples:
                      - Cairns
                  cod:
                    type: integer
                    description: Internal parameter
                    examples:
                      - 200
                x-examples:
                  Example 1:
                    coord:
                      lon: -121.95
                      lat: 37.35
                    weather:
                      - id: 803
                        main: Clouds
                        description: broken clouds
                        icon: 04n
                    base: stations
                    main:
                      temp: 45.25
                      feels_like: 41.16
                      temp_min: 41
                      temp_max: 50
                      pressure: 1026
                      humidity: 75
                    visibility: 16093
                    wind:
                      speed: 2.57
                      deg: 36
                    clouds:
                      all: 75
                    dt: 1579415808
                    sys:
                      type: 1
                      id: 5845
                      country: US
                      sunrise: 1579360793
                      sunset: 1579396557
                    timezone: -28800
                    id: 0
                    name: Santa Clara
                    cod: 200
      security:
        - app_id: []
      servers:
        - url: 'https://api.openweathermap.org/data/2.5'
          description: prod
  /history/city:
    get:
      tags:
        - Weather endpoints
      summary: Hourly Weather history
      description: Acess hourly historical weather data for any location on the globe
      operationId: get-history-city
      parameters:
        - $ref: '#/components/parameters/lat'
        - $ref: '#/components/parameters/lon'
        - name: type
          in: query
          description: 'Type of the call, keep this parameter in the API call as'
          schema:
            type: string
        - name: start
          in: query
          description: 'Start date (unix time, UTC time zone)'
          schema:
            type: integer
        - name: end
          in: query
          description: 'End date (unix time, UTC time zone)'
          schema:
            type: integer
        - name: cnt
          in: query
          description: 'A number of timestamps in response (one per hour, can be used instead of the parameter end)'
          schema:
            type: integer
      requestBody:
        content: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Internal parameter
                  cod:
                    type: string
                    description: Internal parameter
                  city_id:
                    type: integer
                    description: City ID
                  calctime:
                    type: number
                    description: Internal parameter
                  cnt:
                    type: integer
                  list:
                    type: array
                    items:
                      type: object
                      properties:
                        main:
                          type: object
                          properties:
                            temp:
                              type: number
                              description: 'emperature. Unit Default: Kelvin, Metric: Celsius, Imperial: Fahrenheit. '
                            temp_min:
                              type: number
                              description: Minimum temperature within a large city or a megalopolis
                            temp_max:
                              type: number
                              description: Maximum temperature within a large city or a megalopolis
                            pressure:
                              type: integer
                              description: 'Atmospheric pressure on the sea level, hPa'
                            sea_level:
                              type: number
                              description: 'Atmospheric pressure on the sea level, hPa'
                            grnd_level:
                              type: number
                              description: 'Atmospheric pressure on the ground level, hPa'
                            humidity:
                              type: integer
                              description: 'Humidity, %'
                        wind:
                          type: object
                          properties:
                            speed:
                              type: number
                              description: 'Wind speed. Unit Default: meter/sec, Metric: meter/sec, Imperial: miles/hour'
                            deg:
                              type: integer
                              description: 'Wind direction, degrees (meteorological)'
                        clouds:
                          type: object
                          properties:
                            all:
                              type: integer
                              description: 'Cloudiness, %'
                        weather:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                                description: Weather condition id
                              main:
                                type: string
                                description: 'Group of weather parameters (Rain, Snow, Clouds etc.)'
                              description:
                                type: string
                                description: Weather condition within the group.
                              icon:
                                type: string
                                description: Weather icon id
                        dt:
                          type: integer
                          description: 'Time of data calculation, unix, UTC'
                x-examples:
                  Example 1:
                    message: ''
                    cod: '200'
                    city_id: 4887398
                    calctime: 0.0863
                    cnt: 4
                    list:
                      - main:
                          temp: 268.987
                          temp_min: 268.987
                          temp_max: 268.987
                          pressure: 1001.11
                          sea_level: 1024.68
                          grnd_level: 1001.11
                          humidity: 100
                        wind:
                          speed: 5.06
                          deg: 291.002
                        clouds:
                          all: 48
                        weather:
                          - id: 802
                            main: Clouds
                            description: scattered clouds
                            icon: 03d
                        dt: 1485703465
                      - main:
                          temp: 268.097
                          temp_min: 268.097
                          temp_max: 268.097
                          pressure: 1003.57
                          sea_level: 1027.08
                          grnd_level: 1003.57
                          humidity: 100
                        wind:
                          speed: 8.56
                          deg: 314.007
                        clouds:
                          all: 44
                        weather:
                          - id: 802
                            main: Clouds
                            description: scattered clouds
                            icon: 03d
                        dt: 1485730032
                      - main:
                          temp: 266.787
                          temp_min: 266.787
                          temp_max: 266.787
                          pressure: 1005.73
                          sea_level: 1029.63
                          grnd_level: 1005.73
                          humidity: 100
                        wind:
                          speed: 6.79
                          deg: 316.012
                        clouds:
                          all: 0
                        weather:
                          - id: 800
                            main: Clear
                            description: Sky is Clear
                            icon: 01n
                        dt: 1485755383
                      - main:
                          temp: 263.64
                          pressure: 1015
                          humidity: 57
                          temp_min: 262.15
                          temp_max: 265.15
                        wind:
                          speed: 2.6
                          deg: 280
                        clouds:
                          all: 1
                        weather:
                          - id: 800
                            main: Clear
                            description: sky is clear
                            icon: 01n
                        dt: 1485780512
      security:
        - app_id: []
      servers:
        - url: 'https://api.openweathermap.org/data/2.5'
          description: prod
components:
  parameters:
    lon:
      name: lon
      in: query
      description: '**Longitude**. *Example: 139*. Longitude coordinate of the location of your interest. Must use with `lat`.'
      required: false
      schema:
        type: string
    lat:
      name: lat
      in: query
      description: '**Latitude**. *Example: 35*. Latitude coordinate of the location of your interest. Must use with `lat`.'
      required: false
      schema:
        type: string
  securitySchemes:
    app_id:
      type: apiKey
      name: appid
      in: query
security:
  - app_id: []
x-internal: false
